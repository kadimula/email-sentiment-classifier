<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trigger Hello World</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 80px auto; padding: 0 16px; }
    .topbar { position: fixed; top: 16px; left: 16px; }
    .topbar label { font-size: 0.8rem; color: #666; margin-right: 6px; }
    .topbar select { padding: 6px 8px; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 6px; }
    h1 { font-size: 1.25rem; }
    form { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .row { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 12px; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 10px 16px; font-size: 1rem; border: 0; border-radius: 6px; background: #6366f1; color: #fff; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    pre { background: #f4f4f5; padding: 12px; border-radius: 6px; margin-top: 16px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div class="topbar">
    <label for="env">Environment</label>
    <select id="env">
      <option value="prod" selected>prod</option>
      <option value="dev">dev</option>
    </select>
  </div>

  <h1>Trigger the <code>hello-world</code> task</h1>
  <form id="form">
    <input id="name" type="text" placeholder="Enter a name" autocomplete="off" />
    <div class="row">
      <input id="email" type="email" placeholder="Enter an email" autocomplete="off" required />
      <button id="btn" type="submit">Trigger</button>
    </div>
  </form>
  <pre id="out">Type a name and click Trigger.</pre>

  <script>
    const form = document.getElementById("form");
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const envSelect = document.getElementById("env");
    const btn = document.getElementById("btn");
    const out = document.getElementById("out");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      out.textContent = "Triggering…";
      try {
        const res = await fetch("/trigger", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: nameInput.value, email: emailInput.value, env: envSelect.value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);
        out.textContent =
          "Run queued ✅ (" + data.env + ")\n" +
          "Run ID: " + data.id + "\n" +
          (data.publicAccessToken ? "Token: " + data.publicAccessToken.slice(0, 12) + "…\n" : "") +
          "\nCheck the trigger.dev dashboard for the run output.";
      } catch (err) {
        out.textContent = "Error: " + err.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
